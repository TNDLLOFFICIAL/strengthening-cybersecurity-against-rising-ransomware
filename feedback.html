<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC-OPS | FEEDBACK PORTAL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #010409;
            --card-ui: #0d1117;
            --accent-blue: #2f81f7;
            --border: #30363d;
            --text-gray: #8b949e;
        }

        body {
            background-color: var(--bg);
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            padding-top: 150px;
            min-height: 100vh;
        }

        /* CLEAN NAVBAR */
        .navbar { background: rgba(13,17,23,0.96); border-bottom: 1px solid var(--border); padding: 1.2rem 0; }
        .navbar-brand { font-weight: 800; font-size: 1.5rem; color: #fff !important; }
        .nav-link { color: var(--text-gray) !important; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin: 0 15px; }
        .nav-link:hover, .nav-link.active { color: var(--accent-blue) !important; }

        .portal-form-card {
            max-width: 800px;
            margin: 0 auto 100px;
            background: var(--card-ui);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 70px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
        }

        .portal-title { font-size: 3rem; font-weight: 900; color: #fff; margin-bottom: 40px; text-align: center; }

        /* INPUT STYLING */
        .form-label { font-weight: 700; color: #fff; margin-bottom: 12px; font-size: 0.9rem; }
        .form-control, .form-select {
            background: #000 !important;
            border: 1px solid var(--border);
            color: #fff !important;
            padding: 18px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .form-control:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(47, 129, 247, 0.2); }

        /* CONDITIONAL WRAPPER */
        #other-job-wrapper {
            display: none;
            background: rgba(47, 129, 247, 0.05);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 1px dashed var(--accent-blue);
        }

        .btn-submit {
            background: var(--accent-blue);
            color: #fff;
            padding: 20px;
            width: 100%;
            border-radius: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            transition: 0.3s;
        }

        .btn-submit:hover { transform: translateY(-3px); background: #1f6feb; }

        #success-msg { display: none; text-align: center; }

        /* LOG BOX FOR LENGTH */
        .form-logs {
            background: #000;
            padding: 20px;
            border-radius: 8px;
            font-family: 'JetBrains Mono';
            font-size: 0.75rem;
            color: #58a6ff;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">SEC-OPS</a>
            <div class="navbar-nav ms-auto flex-row">
                <a class="nav-link" href="threats.html">Intelligence</a>
                <a class="nav-link" href="science.html">Cryptography</a>
                <a class="nav-link" href="solutions.html">Protocols</a>
                <a class="nav-link" href="impact.html">Assessment</a>
                <a class="nav-link active" href="feedback.html">Feedback</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="portal-form-card">
            <div id="main-portal">
                <h1 class="portal-title">Transmit Intel</h1>
                
                <form id="intel-form" action="https://formspree.io/f/mrejgobo" method="POST">
                    <label class="form-label">Operational Alias</label>
                    <input type="text" name="name" class="form-control" required placeholder="Agent ID or Name">

                    <label class="form-label">Specialization Unit</label>
                    <select name="job" id="job-select" class="form-select" onchange="toggleOther()" required>
                        <option value="" disabled selected>Select Role...</option>
                        <option value="Threat Hunter">Threat Hunter</option>
                        <option value="Crypto Researcher">Crypto Researcher</option>
                        <option value="Policy Architect">Policy Architect</option>
                        <option value="Other">Other (Manual Entry)</option>
                    </select>

                    <div id="other-job-wrapper">
                        <label class="form-label">Specify Unit</label>
                        <input type="text" name="custom_job" id="custom-input" class="form-control" placeholder="e.g. Hardware Auditor">
                    </div>

                    <label class="form-label">Intelligence Payload (Message)</label>
                    <textarea name="message" class="form-control" rows="5" required placeholder="Detailed feedback on system performance..."></textarea>

                    <button type="submit" class="btn-submit">Submit Encrypted Packet</button>
                </form>

                <div class="form-logs">
                    > HANDSHAKE STATUS: SECURE <br>
                    > PKI_ENCRYPTION: ACTIVE <br>
                    > DESTINATION: FORM_HANDLER_CENTRAL
                </div>
            </div>

            <div id="success-msg">
                <h2 class="text-success fw-bold">TRANSMISSION COMPLETE</h2>
                <p class="text-secondary mt-3">The packet has been logged. Return to command center.</p>
                <a href="index.html" class="btn btn-outline-primary mt-4">BACK TO HUB</a>
            </div>
        </div>
    </div>

    <script>
        function toggleOther() {
            const select = document.getElementById('job-select');
            const wrapper = document.getElementById('other-job-wrapper');
            const input = document.getElementById('custom-input');
            if (select.value === 'Other') {
                wrapper.style.display = 'block';
                input.required = true;
            } else {
                wrapper.style.display = 'none';
                input.required = false;
            }
        }

        document.getElementById('intel-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const form = e.target;
            const data = new FormData(form);
            const response = await fetch(form.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } });
            if (response.ok) {
                document.getElementById('main-portal').style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
