<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC-OPS | Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; }
        .navbar { background-color: #161b22; border-bottom: 1px solid #30363d; padding: 1rem; }
        .nav-link { color: #8b949e !important; margin: 0 10px; }
        .active { color: #58a6ff !important; font-weight: bold; border-bottom: 2px solid #58a6ff; }
        .form-card { max-width: 600px; margin: 60px auto; background: #161b22; padding: 40px; border-radius: 15px; border: 1px solid #30363d; }
        .form-control, .form-select { background-color: #0d1117 !important; border: 1px solid #30363d !important; color: white !important; }
        #other-box { display: none; margin-top: 15px; }
        .btn-submit { background-color: #238636; border: none; color: white; font-weight: bold; padding: 12px; width: 100%; border-radius: 5px; }
        
        /* SUCCESS STUFF */
        #success-container { display: none; text-align: center; padding: 20px; }
        .btn-hub { background-color: #58a6ff; color: white; text-decoration: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; display: inline-block; margin-top: 20px; }
        .btn-hub:hover { background-color: #4493f8; color: white; }
        
        footer { padding: 40px; text-align: center; color: #8b949e; border-top: 1px solid #30363d; margin-top: 50px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SEC-OPS</a>
            <div class="navbar-nav ms-auto d-flex flex-row">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="threats.html">Threats</a>
                <a class="nav-link" href="science.html">Science</a>
                <a class="nav-link" href="solutions.html">Solutions</a>
                <a class="nav-link" href="impact.html">Impact</a>
                <a class="nav-link active" href="feedback.html">Feedback</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <form id="feedback-form">
                <div id="form-content">
                    <h2 class="text-white mb-4 text-center">Feedback Hub</h2>
                    
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" id="user-name" name="name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select id="job" name="job" class="form-select" onchange="toggleOther()" required>
                            <option value="" disabled selected>Choose an option...</option>
                            <option value="Student">Student</option>
                            <option value="Teacher">Teacher</option>
                            <option value="Engineer">Engineer</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div id="other-box">
                        <label class="form-label">Specify Job:</label>
                        <input type="text" id="other-input" name="custom_job" class="form-control">
                    </div>

                    <div class="mb-4 mt-3">
                        <label class="form-label">Message</label>
                        <textarea id="user-msg" name="message" class="form-control" rows="4" required></textarea>
                    </div>

                    <button type="submit" id="submit-btn" class="btn-submit">Submit Feedback</button>
                </div>

                <div id="success-container">
                    <h3 class="text-success">✔ Message Sent!</h3>
                    <p>Thanks for helping us make SEC-OPS better.</p>
                    <a href="index.html" class="btn-hub">Return to Home Hub</a>
                </div>
            </form>
        </div>
    </div>

    <footer>&copy; 2026 SEC-OPS Project</footer>

    <script>
        function toggleOther() {
            const select = document.getElementById('job');
            const otherBox = document.getElementById('other-box');
            otherBox.style.display = (select.value === 'Other') ? 'block' : 'none';
        }

        const form = document.getElementById("feedback-form");
        
        form.addEventListener("submit", function(e) {
            e.preventDefault(); // KILL THE REDIRECT IMMEDIATELY

            const submitBtn = document.getElementById("submit-btn");
            const formContent = document.getElementById("form-content");
            const successContainer = document.getElementById("success-container");

            submitBtn.innerHTML = "Sending...";
            submitBtn.disabled = true;

            // STEP 3: SEND DATA SECRETLY IN THE BACKGROUND
            const formData = new FormData();
            formData.append("name", document.getElementById("user-name").value);
            formData.append("job", document.getElementById("job").value);
            formData.append("other", document.getElementById("other-input").value);
            formData.append("message", document.getElementById("user-msg").value);

            fetch("https://formspree.io/f/mrejgobo", {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            })
            .then(response => {
                if (response.ok) {
                    // HIDE THE FORM, SHOW THE HUB BUTTON ON OUR PAGE
                    formContent.style.display = "none";
                    successContainer.style.display = "block";
                } else {
                    alert("Error sending. Please try again.");
                    submitBtn.innerHTML = "Submit Feedback";
                    submitBtn.disabled = false;
                }
            })
            .catch(error => {
                alert("Connection error. Try again later.");
                submitBtn.innerHTML = "Submit Feedback";
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
