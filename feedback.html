<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC-OPS | Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; }
        .navbar { background-color: #161b22; border-bottom: 1px solid #30363d; padding: 1rem; }
        .nav-link { color: #8b949e !important; margin: 0 10px; }
        .active { color: #58a6ff !important; font-weight: bold; border-bottom: 2px solid #58a6ff; }
        .form-card { max-width: 600px; margin: 60px auto; background: #161b22; padding: 40px; border-radius: 15px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-control, .form-select { background-color: #0d1117 !important; border: 1px solid #30363d !important; color: white !important; }
        .form-control:focus, .form-select:focus { border-color: #58a6ff !important; box-shadow: none !important; }
        #other-box { display: none; margin-top: 15px; }
        .btn-submit { background-color: #238636; border: none; color: white; font-weight: bold; padding: 12px; transition: 0.3s; }
        .btn-submit:hover { background-color: #2ea043; }
        footer { padding: 40px; text-align: center; color: #8b949e; border-top: 1px solid #30363d; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SEC-OPS</a>
            <div class="navbar-nav ms-auto d-flex flex-row">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="threats.html">Threats</a>
                <a class="nav-link" href="science.html">Science</a>
                <a class="nav-link" href="solutions.html">Solutions</a>
                <a class="nav-link" href="impact.html">Impact</a>
                <a class="nav-link active" href="feedback.html">Feedback</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <h2 class="text-white mb-4 text-center">Tell Us What You Think</h2>
            <p class="text-center mb-4">Your feedback helps us make the internet a safer place for everyone. Please fill out the form below.</p>
            
            <form id="fbForm" action="https://formspree.io/f/mrejgobo" method="POST">
                <div class="mb-3">
                    <label class="form-label">Your Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">What is your job?</label>
                    <select id="job" name="job" class="form-select" onchange="toggleOther()" required>
                        <option value="" disabled selected>Select an option...</option>
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Engineer">Engineer</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div id="other-box">
                    <label class="form-label">Please type your job title:</label>
                    <input type="text" id="other-input" name="custom_job" class="form-control" placeholder="Writer, Designer, etc.">
                </div>

                <div class="mb-4 mt-3">
                    <label class="form-label">Message / Suggestions</label>
                    <textarea name="message" class="form-control" rows="4" placeholder="How can we improve SEC-OPS?" required></textarea>
                </div>

                <button type="submit" class="btn btn-submit w-100">Send Feedback</button>
            </form>
        </div>
    </div>

    <footer>&copy; 2026 SEC-OPS Project | 9th Grade Cybersecurity Hub</footer>

    <script>
        function toggleOther() {
            var select = document.getElementById('job');
            var otherBox = document.getElementById('other-box');
            var otherInput = document.getElementById('other-input');
            
            if (select.value === 'Other') {
                otherBox.style.display = 'block';
                otherInput.required = true;
            } else {
                otherBox.style.display = 'none';
                otherInput.required = false;
            }
        }
    </script>
</body>
</html>
