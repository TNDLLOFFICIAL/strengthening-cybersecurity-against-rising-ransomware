<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback | SEC-OPS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; padding-top: 70px; }
        .navbar { background-color: #161b22; border-bottom: 1px solid #30363d; }
        .nav-link { color: #8b949e !important; }
        .active { color: #58a6ff !important; font-weight: bold; border-bottom: 2px solid #58a6ff; }
        .form-card { max-width: 600px; margin: 40px auto; background: #161b22; padding: 30px; border-radius: 15px; border: 1px solid #30363d; }
        .form-control, .form-select { background-color: #010409 !important; border: 1px solid #30363d !important; color: white !important; }
        
        /* Version Tag */
        .version-tag { position: fixed; bottom: 10px; right: 15px; background: rgba(22,27,34,0.9); color: #8b949e; padding: 4px 10px; border-radius: 5px; font-size: 11px; font-family: monospace; border: 1px solid #30363d; }

        /* Pop-up Verification Modal */
        #verify-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center;
        }
        .modal-box {
            background: #1c2128; padding: 30px; border-radius: 15px; border: 2px solid #58a6ff;
            max-width: 350px; text-align: center;
        }
        .btn-verify { background: #238636; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; margin-top: 15px; font-weight: bold; }
        
        #success-view { display: none; text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SEC-OPS</a>
            <div class="navbar-nav ms-auto d-flex flex-row gap-3">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="threats.html">Threats</a>
                <a class="nav-link" href="science.html">Science</a>
                <a class="nav-link" href="solutions.html">Solutions</a>
                <a class="nav-link" href="impact.html">Impact</a>
                <a class="nav-link active" href="feedback.html">Feedback</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <div id="form-view">
                <h2 class="text-white mb-3">Project Feedback</h2>
                <p class="text-muted">Tell us what you think about the site! No email required.</p>
                <hr border-color="#333">
                
                <form id="feedbackForm" action="https://formspree.io/f/mrejgobo" method="POST">
                    <label class="form-label">Your Name</label>
                    <input type="text" name="name" class="form-control mb-3" placeholder="Nickname or Name" required>

                    <label class="form-label">I am a...</label>
                    <select name="user_type" class="form-select mb-3" required>
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Guest">Guest</option>
                    </select>

                    <label class="form-label">What should we add next?</label>
                    <textarea name="message" class="form-control mb-4" rows="4" placeholder="Type your ideas here..." required></textarea>

                    <button type="button" class="btn btn-primary w-100 py-2 fw-bold" onclick="startVerify()">SUBMIT AND VERIFY</button>
                </form>
            </div>

            <div id="success-view">
                <h2 style="color: #3fb950;">Thanks for the feedback!</h2>
                <p>Your response was verified and sent.</p>
                <a href="index.html" class="btn btn-outline-primary mt-3">Back to Home</a>
            </div>
        </div>
    </div>

    <div id="verify-modal">
        <div class="modal-box">
            <h4 class="text-white">Bot Check</h4>
            <p class="text-muted small">Solve this to prove you're human:</p>
            <h1 id="math-display" class="my-4 text-info"></h1>
            <input type="number" id="math-input" class="form-control text-center fs-3" placeholder="?">
            <button class="btn-verify" onclick="checkAnswer()">Confirm</button>
            <button class="btn btn-link btn-sm mt-2 text-muted" onclick="closePop()">Cancel</button>
        </div>
    </div>

    <div class="version-tag">SEC-OPS: v1.5.1</div>

    <script>
        let answer = 0;

        function startVerify() {
            // Randomly picks addition, subtraction, or multiplication
            const n1 = Math.floor(Math.random() * 20) + 1;
            const n2 = Math.floor(Math.random() * 10) + 1;
            const modes = ['+', '-', '*'];
            const mode = modes[Math.floor(Math.random() * modes.length)];

            if(mode === '+') { answer = n1 + n2; document.getElementById('math-display').innerText = n1 + " + " + n2; }
            if(mode === '-') { answer = n1 - n2; document.getElementById('math-display').innerText = n1 + " - " + n2; }
            if(mode === '*') { answer = n1 * n2; document.getElementById('math-display').innerText = n1 + " x " + n2; }

            document.getElementById('verify-modal').style.display = 'flex';
        }

        function closePop() {
            document.getElementById('verify-modal').style.display = 'none';
        }

        async function checkAnswer() {
            const userIn = document.getElementById('math-input').value;
            if(userIn == answer) {
                closePop();
                const form = document.getElementById('feedbackForm');
                const submitBtn = document.querySelector('button[onclick="startVerify()"]');
                submitBtn.innerText = "Sending...";
                submitBtn.disabled = true;

                const data = new FormData(form);
                await fetch(form.action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } });

                document.getElementById('form-view').style.display = 'none';
                document.getElementById('success-view').style.display = 'block';
            } else {
                alert("Wrong answer! Try a new one.");
                startVerify(); // Get a new random problem
                document.getElementById('math-input').value = "";
            }
        }
    </script>
</body>
</html>
