<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SEC-OPS | Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; }
        .navbar { background-color: #161b22; border-bottom: 1px solid #30363d; padding: 1rem; }
        .nav-link { color: #8b949e !important; margin: 0 10px; }
        .active { color: #58a6ff !important; font-weight: bold; border-bottom: 2px solid #58a6ff; }
        .form-card { max-width: 700px; margin: 50px auto; background: #161b22; padding: 40px; border-radius: 20px; border: 1px solid #30363d; }
        .form-control, .form-select { background: #0d1117 !important; color: white !important; border-color: #30363d !important; }
        #other-box { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SEC-OPS</a>
            <div class="navbar-nav ms-auto d-flex flex-row">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="threats.html">Threats</a>
                <a class="nav-link" href="science.html">Science</a>
                <a class="nav-link" href="solutions.html">Solutions</a>
                <a class="nav-link" href="impact.html">Impact</a>
                <a class="nav-link active" href="feedback.html">Feedback</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <h2 class="text-white mb-4">Community Feedback</h2>
            <p>Your input helps us improve the platform. Tell us about your experience and how you use the internet.</p>
            <form action="https://formspree.io/f/mrejgobo" method="POST">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Current Role</label>
                    <select id="role" name="role" class="form-select" onchange="checkRole()">
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Engineer">Engineer</option>
                        <option value="Other">Other...</option>
                    </select>
                </div>
                <div id="other-box">
                    <label class="form-label">Specify Job</label>
                    <input type="text" name="other_role" class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label">Message</label>
                    <textarea name="msg" class="form-control" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-3">Submit Report</button>
            </form>
        </div>
    </div>

    <script>
        function checkRole() {
            const role = document.getElementById('role').value;
            const otherBox = document.getElementById('other-box');
            otherBox.style.display = (role === 'Other') ? 'block' : 'none';
        }
    </script>
</body>
</html>
