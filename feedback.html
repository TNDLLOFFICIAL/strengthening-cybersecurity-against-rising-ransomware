<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC-OPS | Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; }
        .navbar { background-color: #161b22; border-bottom: 1px solid #30363d; padding: 1rem; }
        .nav-link { color: #8b949e !important; margin: 0 10px; }
        .active { color: #58a6ff !important; font-weight: bold; border-bottom: 2px solid #58a6ff; }
        .form-card { max-width: 600px; margin: 60px auto; background: #161b22; padding: 40px; border-radius: 15px; border: 1px solid #30363d; }
        .form-control, .form-select { background-color: #0d1117 !important; border: 1px solid #30363d !important; color: white !important; }
        #other-box { display: none; margin-top: 15px; }
        .btn-submit { background-color: #238636; border: none; color: white; font-weight: bold; padding: 12px; width: 100%; border-radius: 5px; }
        .btn-hub { display: none; background-color: #58a6ff; color: white; text-decoration: none; padding: 12px; border-radius: 5px; font-weight: bold; text-align: center; margin-top: 15px; }
        .btn-hub:hover { color: white; background-color: #4493f8; }
        #status-message { display: none; margin-top: 20px; padding: 15px; border-radius: 5px; text-align: center; font-weight: bold; }
        footer { padding: 40px; text-align: center; color: #8b949e; border-top: 1px solid #30363d; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SEC-OPS</a>
            <div class="navbar-nav ms-auto d-flex flex-row">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="threats.html">Threats</a>
                <a class="nav-link" href="science.html">Science</a>
                <a class="nav-link" href="solutions.html">Solutions</a>
                <a class="nav-link" href="impact.html">Impact</a>
                <a class="nav-link active" href="feedback.html">Feedback</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <h2 class="text-white mb-4 text-center">Feedback Hub</h2>
            
            <form id="my-form">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" id="full-name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select id="job" name="job" class="form-select" onchange="toggleOther()" required>
                        <option value="" disabled selected>Choose an option...</option>
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Engineer">Engineer</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div id="other-box">
                    <label class="form-label">Please specify:</label>
                    <input type="text" id="other-input" name="custom_job" class="form-control">
                </div>

                <div class="mb-4 mt-3">
                    <label class="form-label">Message</label>
                    <textarea name="message" id="message-body" class="form-control" rows="4" required></textarea>
                </div>

                <button type="submit" id="my-form-button" class="btn-submit">Submit Feedback</button>
                
                <div id="status-message"></div>
                <a href="index.html" id="hub-button" class="btn-hub d-block">Return to Home Hub</a>
            </form>
        </div>
    </div>

    <footer>&copy; 2026 SEC-OPS Project</footer>

    <script>
        function toggleOther() {
            var select = document.getElementById('job');
            var otherBox = document.getElementById('other-box');
            if (select.value === 'Other') {
                otherBox.style.display = 'block';
                document.getElementById('other-input').required = true;
            } else {
                otherBox.style.display = 'none';
                document.getElementById('other-input').required = false;
            }
        }

        const form = document.getElementById("my-form");
        
        async function handleSubmit(event) {
          event.preventDefault();
          const status = document.getElementById("status-message");
          const hubBtn = document.getElementById("hub-button");
          const submitBtn = document.getElementById("my-form-button");
          
          // Formspree Endpoint URL - PASTE YOURS HERE
          const url = "https://formspree.io/f/mrejgobo";
          
          const data = new FormData();
          data.append("name", document.getElementById("full-name").value);
          data.append("job", document.getElementById("job").value);
          data.append("other_job", document.getElementById("other-input").value);
          data.append("message", document.getElementById("message-body").value);

          submitBtn.disabled = true;
          submitBtn.innerHTML = "Sending...";

          fetch(url, {
            method: 'POST',
            body: data,
            headers: { 'Accept': 'application/json' }
          }).then(response => {
            if (response.ok) {
              status.style.display = "block";
              status.style.backgroundColor = "#238636";
              status.style.color = "white";
              status.innerHTML = "Thanks! Your feedback was received.";
              hubBtn.style.display = "block"; // Show the Return button
              submitBtn.style.display = "none"; // Hide the submit button
              form.reset();
            } else {
              status.style.display = "block";
              status.style.backgroundColor = "#f85149";
              status.innerHTML = "Oops! Something went wrong.";
              submitBtn.disabled = false;
              submitBtn.innerHTML = "Submit Feedback";
            }
          }).catch(error => {
            status.style.display = "block";
            status.style.backgroundColor = "#f85149";
            status.innerHTML = "Oops! Connection error.";
            submitBtn.disabled = false;
            submitBtn.innerHTML = "Submit Feedback";
          });
        }
        
        form.addEventListener("submit", handleSubmit);
    </script>
</body>
</html>
