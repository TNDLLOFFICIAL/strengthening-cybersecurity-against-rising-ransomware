<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback | SEC-OPS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; padding-top: 70px; }
        .navbar { background-color: #161b22; border-bottom: 1px solid #30363d; }
        .nav-link { color: #8b949e !important; }
        .active { color: #58a6ff !important; font-weight: bold; border-bottom: 2px solid #58a6ff; }
        .form-card { max-width: 600px; margin: 40px auto; background: #161b22; padding: 30px; border-radius: 15px; border: 1px solid #30363d; }
        .form-control, .form-select { background-color: #010409 !important; border: 1px solid #30363d !important; color: white !important; }
        
        .version-tag { position: fixed; bottom: 10px; right: 15px; background: rgba(22,27,34,0.9); color: #8b949e; padding: 4px 10px; border-radius: 5px; font-size: 11px; font-family: monospace; border: 1px solid #30363d; }

        /* Modal Overlay */
        #verify-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center;
        }
        .modal-box {
            background: #1c2128; padding: 40px; border-radius: 15px; border: 2px solid #58a6ff;
            max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(88, 166, 255, 0.2);
        }
        .btn-verify { background: #238636; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; margin-top: 15px; font-weight: bold; }
        #success-view { display: none; text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SEC-OPS</a>
            <div class="navbar-nav ms-auto d-flex flex-row gap-3">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="threats.html">Threats</a>
                <a class="nav-link" href="science.html">Science</a>
                <a class="nav-link" href="solutions.html">Solutions</a>
                <a class="nav-link" href="impact.html">Impact</a>
                <a class="nav-link active" href="feedback.html">Feedback</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <div id="form-view">
                <h2 class="text-white mb-3">Project Feedback</h2>
                <form id="feedbackForm" oninput="checkForm()">
                    <label class="form-label">Your Name</label>
                    <input type="text" id="f-name" name="name" class="form-control mb-3" placeholder="Required" required>

                    <label class="form-label">I am a...</label>
                    <select id="f-type" name="user_type" class="form-select mb-3" required>
                        <option value="" disabled selected>-- Select an option --</option>
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Guest">Guest</option>
                    </select>

                    <label class="form-label">Comments</label>
                    <textarea id="f-msg" name="message" class="form-control mb-4" rows="4" placeholder="Required" required></textarea>

                    <button type="button" id="submit-trigger" class="btn btn-primary w-100 py-3 fw-bold" onclick="launchCaptcha()" disabled>COMPLETE FORM TO VERIFY</button>
                </form>
            </div>

            <div id="success-view">
                <h2 style="color: #3fb950;">✔ Sent!</h2>
                <p>Verification complete. Data transmitted.</p>
                <a href="index.html" class="btn btn-outline-primary mt-3">Back to Home</a>
            </div>
        </div>
    </div>

    <div id="verify-modal">
        <div class="modal-box">
            <h4 class="text-white" id="modal-title">Verification Required</h4>
            <p id="modal-instruction" class="text-info fw-bold mb-4"></p>
            <h2 id="challenge-display" class="mb-4 text-white"></h2>
            
            <input type="text" id="captcha-input" class="form-control text-center fs-4" placeholder="Answer here...">

            <button class="btn-verify" onclick="validateCaptcha()">Verify Identity</button>
            <button class="btn btn-link btn-sm mt-2 text-muted" onclick="document.getElementById('verify-modal').style.display='none'">Cancel</button>
        </div>
    </div>

    <div class="version-tag">SEC-OPS: v1.7.0</div>

    <script>
        let currentSolution = "";

        // Function to unlock the button only when all fields are filled
        function checkForm() {
            const name = document.getElementById('f-name').value.trim();
            const type = document.getElementById('f-type').value;
            const msg = document.getElementById('f-msg').value.trim();
            const btn = document.getElementById('submit-trigger');

            if (name !== "" && type !== "" && msg !== "") {
                btn.disabled = false;
                btn.innerText = "SUBMIT AND VERIFY";
            } else {
                btn.disabled = true;
                btn.innerText = "COMPLETE FORM TO VERIFY";
            }
        }

        function launchCaptcha() {
            const display = document.getElementById('challenge-display');
            const instruction = document.getElementById('modal-instruction');
            const input = document.getElementById('captcha-input');
            input.value = "";
            display.style.color = "white"; // Reset color

            // Randomly pick 1 of 4 main categories (giving thousands of total combos)
            const mode = Math.floor(Math.random() * 4);

            if (mode === 0) {
                // MATH: 100 numbers * 20 numbers * 3 operators = 6,000 combos
                const n1 = Math.floor(Math.random() * 100) + 5;
                const n2 = Math.floor(Math.random() * 20) + 2;
                const ops = ['+', '-', '*'];
                const op = ops[Math.floor(Math.random() * ops.length)];
                instruction.innerText = "INSTRUCTION: Solve the math problem below.";
                display.innerText = `${n1} ${op === '*' ? '×' : op} ${n2}`;
                currentSolution = eval(n1 + op + n2).toString();
            } 
            else if (mode === 1) {
                // COLOR-TEXT MATCH: 10 colors * 10 visual colors = 100 combos
                const colors = ["Red", "Blue", "Green", "Yellow", "Purple", "Orange", "Cyan", "Pink", "White", "Gray"];
                const word = colors[Math.floor(Math.random() * colors.length)];
                const visual = colors[Math.floor(Math.random() * colors.length)];
                instruction.innerText = "INSTRUCTION: Type the NAME of the color you SEE (not what the word says).";
                display.innerText = word;
                display.style.color = visual.toLowerCase();
                currentSolution = visual;
            } 
            else if (mode === 2) {
                // SYMBOL ODD-OUT: 5 patterns * 26 letters = 130 combos
                const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                const randChar = chars[Math.floor(Math.random() * chars.length)];
                const oddChar = Math.floor(Math.random() * 9);
                let str = "";
                for(let i=0; i<8; i++) {
                    str += (i === oddChar) ? "!" : randChar;
                }
                instruction.innerText = "INSTRUCTION: Type the symbol that is NOT a letter.";
                display.innerText = str;
                currentSolution = "!";
            }
            else {
                // CASE SENSITIVE: 20 words * random casing = 400+ combos
                const words = ["Shield", "Secure", "Cyber", "Unlock", "Access", "Matrix", "Binary", "System"];
                const word = words[Math.floor(Math.random() * words.length)];
                instruction.innerText = "INSTRUCTION: Re-type this word exactly (Case Sensitive).";
                display.innerText = word;
                currentSolution = word;
            }

            document.getElementById('verify-modal').style.display = 'flex';
        }

        async function validateCaptcha() {
            const userVal = document.getElementById('captcha-input').value.trim();
            
            if(userVal.toLowerCase() === currentSolution.toLowerCase()) {
                // Success
                document.getElementById('verify-modal').style.display = 'none';
                document.getElementById('form-view').style.display = 'none';
                document.getElementById('success-view').style.display = 'block';
            } else {
                alert("Verification Failed. Logic mismatch. Try again.");
                launchCaptcha();
            }
        }
    </script>
</body>
</html>
