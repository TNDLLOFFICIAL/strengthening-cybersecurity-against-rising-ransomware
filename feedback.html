<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback | SEC-OPS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; padding-top: 80px; line-height: 1.8; }
        .navbar { background-color: #161b22; border-bottom: 1px solid #30363d; }
        .nav-link { color: #8b949e !important; }
        .active { color: #58a6ff !important; font-weight: bold; border-bottom: 2px solid #58a6ff; }
        
        .form-container { max-width: 700px; margin: 40px auto; }
        .secure-card { 
            background: #161b22; border: 1px solid #30363d; border-radius: 20px; 
            padding: 50px; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .form-control, .form-select { 
            background-color: #010409 !important; border: 1px solid #30363d !important; 
            color: white !important; padding: 12px; transition: 0.3s;
        }
        .form-control:focus { border-color: #58a6ff !important; box-shadow: 0 0 0 0.25rem rgba(88, 166, 255, 0.1); }

        .btn-submit { 
            background: #238636; color: white; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; border: none; padding: 15px; width: 100%; border-radius: 10px;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #2ea043; }
        .btn-submit:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }

        #verify-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 20000; align-items: center; justify-content: center; 
        }
        .modal-box { 
            background: #1c2128; padding: 40px; border-radius: 20px; border: 2px solid #58a6ff; 
            max-width: 400px; width: 90%; text-align: center;
        }
        #cd { font-size: 2.5rem; font-weight: 900; margin: 20px 0; font-family: monospace; }
        .instr { color: #58a6ff; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }

        .version-tag { 
            position: fixed; bottom: 10px; right: 15px; background: rgba(22,27,34,0.9); 
            color: #8b949e; padding: 4px 10px; border-radius: 5px; font-size: 11px; 
            font-family: monospace; border: 1px solid #30363d; z-index: 10000; pointer-events: none; 
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SEC-OPS</a>
            <div class="navbar-nav ms-auto d-flex flex-row gap-3">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="threats.html">Threats</a>
                <a class="nav-link" href="science.html">Science</a>
                <a class="nav-link" href="solutions.html">Solutions</a>
                <a class="nav-link" href="impact.html">Impact</a>
                <a class="nav-link active" href="feedback.html">Feedback</a>
                <a class="nav-link" href="demo.html">Demo</a>
            </div>
        </div>
    </nav>

    <div class="container form-container">
        <div class="secure-card">
            <div id="form-view">
                <h2 class="text-white mb-4">Share Your Thoughts</h2>
                <p class="text-secondary mb-4">We'd love to hear your feedback on the SEC-OPS project.</p>
                
                <form id="feedbackForm" action="https://formspree.io/f/mrejgobo" method="POST" oninput="checkLock()">
                    <div class="mb-3">
                        <label class="form-label text-secondary small text-uppercase fw-bold">Full Name</label>
                        <input type="text" id="n-f" name="name" class="form-control" placeholder="What is your name?" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small text-uppercase fw-bold">Who are you?</label>
                        <select id="r-f" name="user_type" class="form-select" required>
                            <option value="" disabled selected>Choose an option</option>
                            <option value="Student">I am a Student</option>
                            <option value="Teacher">I am a Teacher</option>
                            <option value="Expert">I work in Tech/Security</option>
                            <option value="Guest">Just visiting!</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-secondary small text-uppercase fw-bold">Your Message</label>
                        <textarea id="m-f" name="message" class="form-control" rows="5" placeholder="Write your feedback here..." required></textarea>
                    </div>
                    <button type="button" id="s-b" class="btn-submit" onclick="startCap()" disabled>Please fill out the form</button>
                </form>
            </div>

            <div id="success-view" style="display: none;" class="text-center py-5">
                <h2 style="color: #3fb950;">✔ Message Sent!</h2>
                <p>Thanks for the feedback, Ahnaf will read it soon.</p>
                <a href="index.html" class="btn btn-outline-primary mt-4">Back to Home</a>
            </div>
        </div>
    </div>

    <div id="verify-modal">
        <div class="modal-box">
            <span class="instr" id="ci"></span>
            <div id="cd"></div>
            <input type="text" id="ca" class="form-control text-center fs-4 mb-3" autocomplete="off" placeholder="Type here...">
            <button class="btn btn-primary w-100 fw-bold" onclick="checkCap()">SEND MESSAGE</button>
        </div>
    </div>

    <div class="version-tag">v5.8.2.1</div>

    <script>
        let sol = "";
        function checkLock() {
            const n = document.getElementById('n-f').value;
            const r = document.getElementById('r-f').value;
            const m = document.getElementById('m-f').value;
            const b = document.getElementById('s-b');
            if(n && r && m) { b.disabled = false; b.innerText = "SEND FEEDBACK"; }
            else { b.disabled = true; b.innerText = "Please fill out the form"; }
        }

        function startCap() {
            const d = document.getElementById('cd'); const i = document.getElementById('ci'); const a = document.getElementById('ca');
            a.value = ""; d.style.color = "white"; const mode = Math.floor(Math.random() * 3);
            
            if(mode === 0) { 
                const n1 = Math.floor(Math.random()*20); const n2 = Math.floor(Math.random()*10);
                i.innerText = "Quick Math Check"; d.innerText = n1 + " + " + n2; sol = (n1+n2).toString();
            } else if(mode === 1) {
                i.innerText = "Type this word"; d.innerText = "SECURE"; sol = "SECURE";
            } else {
                i.innerText = "Final Character"; d.innerText = "1 2 [3] 4"; sol = "3";
            }
            document.getElementById('verify-modal').style.display = 'flex';
            a.focus();
        }

        async function checkCap() {
            const v = document.getElementById('ca').value.trim();
            const form = document.getElementById('feedbackForm');

            if(v.toUpperCase() === sol.toUpperCase()) {
                document.getElementById('verify-modal').style.display = 'none';

                const data = new FormData(form);
                fetch(form.action, {
                    method: form.method,
                    body: data,
                    headers: { 'Accept': 'application/json' }
                }).then(response => {
                    if (response.ok) {
                        document.getElementById('form-view').style.display = 'none';
                        document.getElementById('success-view').style.display = 'block';
                    } else {
                        alert("Oops! Something went wrong. Try again.");
                    }
                }).catch(error => {
                    alert("Network error. Please check your internet.");
                });

            } else { 
                alert("That didn't match. Try one more time!"); 
                startCap(); 
            }
        }
    </script>
</body>
</html>
