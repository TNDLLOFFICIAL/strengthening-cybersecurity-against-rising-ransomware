<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC-OPS | FEEDBACK PORTAL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        :root { --bg: #010409; --card: #0d1117; --accent: #2f81f7; --border: #30363d; --success: #3fb950; --text: #c9d1d9; --text-dim: #8b949e; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding-top: 140px; min-height: 100vh; }
        .navbar { background: rgba(13, 17, 23, 0.98); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 1.5rem 0; }
        .nav-link { color: var(--text-dim) !important; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin: 0 15px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #fff !important; }
        .portal-wrapper { max-width: 800px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.5); }
        .portal-header { background: #161b22; padding: 40px; border-bottom: 1px solid var(--border); text-align: center; }
        .portal-body { padding: 50px; }
        .terminal-text { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--accent); margin-bottom: 30px; border-left: 3px solid var(--accent); padding-left: 20px; }
        .form-label { font-family: 'JetBrains Mono'; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; display: block; }
        .form-control { background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 8px; margin-bottom: 25px; transition: 0.3s; }
        .form-control:focus { background: #000; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(47, 129, 247, 0.1); color: #fff; outline: none; }
        .btn-action { background: var(--accent); color: #fff; border: none; padding: 18px; border-radius: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; width: 100%; transition: 0.4s; }
        .btn-action:hover { background: #1f6feb; transform: translateY(-2px); }
        #verification-step { display: none; text-align: center; }
        .success-screen { display: none; text-align: center; padding: 40px; }
        footer { margin-top: 100px; padding: 40px; text-align: center; font-size: 0.7rem; color: var(--text-dim); border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="index.html">SEC-OPS</a>
            <div class="navbar-nav ms-auto flex-row">
                <a class="nav-link" href="threats.html">Intelligence</a>
                <a class="nav-link" href="science.html">Cryptography</a>
                <a class="nav-link" href="solutions.html">Protocols</a>
                <a class="nav-link" href="impact.html">Assessment</a>
                <a class="nav-link active" href="feedback.html">Feedback</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="portal-wrapper">
            <div class="portal-header">
                <h2 class="text-white fw-bold">Feedback Uplink</h2>
                <p class="text-secondary small">SECURE CHANNEL: AHNAFZ-COMM-ALPHA</p>
            </div>
            <div class="portal-body">
                <div id="form-container">
                    <div class="terminal-text">> READY_FOR_INPUT...<br>> DESTINATION: ahnafz2011@gmail.com</div>
                    
                    <form id="feedback-form" action="https://formspree.io/f/mrejgobo" method="POST">
                        <div id="initial-step">
                            <label class="form-label">Agent Email</label>
                            <input type="email" name="email" id="email-input" class="form-control" required>
                            
                            <label class="form-label">Message Content</label>
                            <textarea name="message" class="form-control" rows="5" required></textarea>
                            
                            <button type="button" onclick="showVerification()" class="btn-action">Proceed to Verification</button>
                        </div>

                        <div id="verification-step">
                            <label class="form-label">Verification Token</label>
                            <input type="text" class="form-control" placeholder="6-Digit Code" maxlength="6" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px;">
                            <button type="submit" class="btn-action" style="background: var(--success);">Authorize Transmission</button>
                        </div>
                    </form>
                </div>

                <div id="success-screen" class="success-screen">
                    <h2 class="text-success fw-bold">✓ SENT</h2>
                    <p class="text-secondary">Transmission encrypted and delivered.</p>
                    <a href="index.html" class="btn-action d-inline-block mt-3" style="width: auto; padding: 10px 30px;">Home</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById("feedback-form");
        function showVerification() {
            const email = document.getElementById("email-input").value;
            if(email.includes('@')) {
                document.getElementById("initial-step").style.display = "none";
                document.getElementById("verification-step").style.display = "block";
            } else { alert("Error: Invalid Email"); }
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const data = new FormData(form);
            const response = await fetch(form.action, { method: "POST", body: data, headers: { 'Accept': 'application/json' } });
            if (response.ok) {
                document.getElementById("form-container").style.display = "none";
                document.getElementById("success-screen").style.display = "block";
            } else { alert("Transmission Failure."); }
        });
    </script>
</body>
</html>
