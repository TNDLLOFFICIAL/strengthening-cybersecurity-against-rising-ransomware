<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback | SEC-OPS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .navbar { background-color: #161b22; border-bottom: 1px solid #30363d; padding: 1rem; }
        .nav-link { color: #8b949e !important; }
        .active { color: #58a6ff !important; }
        .form-container { max-width: 600px; margin: 60px auto; background: #161b22; padding: 40px; border-radius: 15px; border: 1px solid #30363d; }
        #other-box { display: none; margin-top: 15px; }
        .form-control, .form-select { background-color: #0d1117 !important; border: 1px solid #30363d !important; color: white !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SEC-OPS</a>
            <div class="navbar-nav ms-auto d-flex flex-row gap-3">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="threats.html">Threats</a>
                <a class="nav-link" href="science.html">Science</a>
                <a class="nav-link" href="solutions.html">Solutions</a>
                <a class="nav-link" href="impact.html">Impact</a>
                <a class="nav-link active" href="feedback.html">Feedback</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 class="text-white mb-4 text-center">Tell Us What You Think</h2>
            <form id="fbForm" action="https://formspree.io/f/mrejgobo" method="POST">
                <label class="form-label">Your Name</label>
                <input type="text" name="name" class="form-control mb-3" required>

                <label class="form-label">Your Job</label>
                <select id="job" name="job" class="form-select mb-3" onchange="checkOther()" required>
                    <option value="" disabled selected>Select one...</option>
                    <option value="Student">Student</option>
                    <option value="Teacher">Teacher</option>
                    <option value="Engineer">Engineer</option>
                    <option value="Other">Other</option>
                </select>

                <div id="other-box">
                    <label class="form-label">Please state your job:</label>
                    <input type="text" id="other-input" name="custom_job" class="form-control mb-3">
                </div>

                <label class="form-label">Message</label>
                <textarea name="message" class="form-control mb-4" rows="4" required></textarea>

                <button type="submit" class="btn btn-success w-100 fw-bold">Send Feedback</button>
            </form>
        </div>
    </div>

    <script>
        function checkOther() {
            var select = document.getElementById('job');
            var otherBox = document.getElementById('other-box');
            var otherInput = document.getElementById('other-input');
            if (select.value === 'Other') {
                otherBox.style.display = 'block';
                otherInput.required = true;
            } else {
                otherBox.style.display = 'none';
                otherInput.required = false;
            }
        }
    </script>
</body>
</html>
